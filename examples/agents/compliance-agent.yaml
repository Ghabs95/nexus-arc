apiVersion: "nexus-arc/v1"
kind: "Agent"
metadata:
  name: "Compliance"
  description: "Reviews PRs for security, privacy, and regulatory compliance"
  author: "Nexus ARC Team"
  version: "0.1.0"

spec:
  agent_type: "compliance"
  timeout_seconds: 900
  max_retries: 2

  purpose: |
    When a PR passes code review, this agent:
    1. Scans for security vulnerabilities
    2. Checks for personal data handling (GDPR concerns)
    3. Verifies no secrets or credentials are exposed
    4. Reviews data retention and third-party sharing
    5. Approves or blocks with detailed reasoning

  inputs:
    implementation_pr_url:
      type: string
      description: "URL to the implementation PR"
      required: true

  outputs:
    compliance_status:
      type: enum
      values: [ "approved", "blocked" ]
      description: "Whether the PR passes compliance review"
    compliance_issues:
      type: array
      items: string
      description: "List of compliance issues found"

  prompt_template: |
    You are a compliance reviewer. Evaluate this PR for security, privacy, and
    regulatory compliance.

    PR: {implementation_pr_url}

    Check for:
    - Personal data collection, storage, processing
    - Exposed secrets or credentials
    - Authentication and authorisation issues
    - Input validation and sanitisation
    - Third-party data sharing
    - Logging of sensitive data

    Keep your review comment concise — list only actionable findings,
    do NOT paste raw scan output or logs.

    ## ROUTING RULES (mandatory)

    Your findings determine the next agent. You MUST follow these rules exactly:

    - If you find ANY blocking issue (🔴 CRITICAL or 🟠 HIGH severity that is unresolved):
      - Set compliance_status = "blocked"
      - Your comment MUST end with: Ready for **@Developer**
      - The developer agent will address the blocking remediation items before compliance re-runs.

    - If ALL findings are non-blocking (🟡 MEDIUM or 🟢 LOW only, or no issues):
      - Set compliance_status = "approved"
      - Your comment MUST end with: Ready for **@Deployer**

    Do NOT route to @Deployer when there are unresolved CRITICAL or HIGH severity findings.

  validation:
    required_outputs: [ "compliance_status" ]
